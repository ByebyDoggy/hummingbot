# Development environment configuration
# Usage: docker compose -f docker-compose.dev.yml up -d
services:
  hummingbot:
    container_name: hummingbot-dev
    image: hummingbot-base:latest
    working_dir: /home/hummingbot
    volumes:
      - ./conf:/home/hummingbot/conf
      - ./conf/connectors:/home/hummingbot/conf/connectors
      - ./conf/strategies:/home/hummingbot/conf/strategies
      - ./conf/controllers:/home/hummingbot/conf/controllers
      - ./conf/scripts:/home/hummingbot/conf/scripts
      - ./logs:/home/hummingbot/logs
      - ./data:/home/hummingbot/data
      - ./certs:/home/hummingbot/certs
      - ./scripts:/home/hummingbot/scripts
      - ./controllers:/home/hummingbot/controllers
      # Mount source code for development (Python files will override compiled ones)
      # Note: .so files from base image will be preserved
      - ./bin:/home/hummingbot/bin
      # Only mount Python files to preserve compiled .so extensions
      # - ./hummingbot:/home/hummingbot/hummingbot
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    tty: true
    stdin_open: true
    network_mode: host
    environment:
      - INSTALLATION_TYPE=docker
    #  - CONFIG_PASSWORD=admin
    #  - CONFIG_FILE_NAME=v2_with_controllers.py
    #  - SCRIPT_CONFIG=conf_v2_with_controllers.yml
    command: ["/bin/bash", "-lc", "conda activate hummingbot && python ./bin/hummingbot_quickstart.py 2>> ./logs/errors.log"]
    # For development shell access, use: docker compose -f docker-compose.dev.yml exec hummingbot bash

